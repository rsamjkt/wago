<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
  </defs>
  <!-- Sun body -->
  <circle cx="50" cy="52" r="18" fill="url(#sunGrad)"/>
  <!-- Horizon line -->
  <rect x="8" y="68" width="84" height="4" rx="2" fill="url(#sunGrad)" opacity="0.7"/>
  <!-- Top ray -->
  <rect x="47.5" y="10" width="5" height="14" rx="2.5" fill="#FBBF24"/>
  <!-- Left ray -->
  <rect x="9" y="49.5" width="14" height="5" rx="2.5" fill="#FBBF24"/>
  <!-- Right ray -->
  <rect x="77" y="49.5" width="14" height="5" rx="2.5" fill="#FBBF24"/>
  <!-- Top-left ray -->
  <rect x="21" y="20" width="5" height="13" rx="2.5" fill="#FBBF24" transform="rotate(-45 23.5 26.5)"/>
  <!-- Top-right ray -->
  <rect x="74" y="20" width="5" height="13" rx="2.5" fill="#FBBF24" transform="rotate(45 76.5 26.5)"/>
</svg>
