name: Build & Push Docker Image

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
    branches-ignore:
      - "*"

jobs:
  build-amd64:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    environment: production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ./docker/golang.Dockerfile
          tags: |
            ${{ secrets.REGISTRY_USERNAME }}/arunika-wa:${{ github.ref_name }}-amd
            ghcr.io/${{ github.repository_owner }}/arunika-wa:${{ github.ref_name }}-amd

  build-arm64:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    environment: production
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ./docker/golang.Dockerfile
          tags: |
            ${{ secrets.REGISTRY_USERNAME }}/arunika-wa:${{ github.ref_name }}-arm
            ghcr.io/${{ github.repository_owner }}/arunika-wa:${{ github.ref_name }}-arm

  merge-manifest:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create multi-arch manifest (Docker Hub)
        run: |
          docker buildx imagetools create \
            -t ${{ secrets.REGISTRY_USERNAME }}/arunika-wa:${{ github.ref_name }} \
            -t ${{ secrets.REGISTRY_USERNAME }}/arunika-wa:latest \
            ${{ secrets.REGISTRY_USERNAME }}/arunika-wa:${{ github.ref_name }}-amd \
            ${{ secrets.REGISTRY_USERNAME }}/arunika-wa:${{ github.ref_name }}-arm

      - name: Create multi-arch manifest (GHCR)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/arunika-wa:${{ github.ref_name }} \
            -t ghcr.io/${{ github.repository_owner }}/arunika-wa:latest \
            ghcr.io/${{ github.repository_owner }}/arunika-wa:${{ github.ref_name }}-amd \
            ghcr.io/${{ github.repository_owner }}/arunika-wa:${{ github.ref_name }}-arm
